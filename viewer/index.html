<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>LayoutLab Viewer</title>
    <link rel="stylesheet" href="/src/styles.css" />
  </head>
  <body>
    <div id="app">
      <header class="topbar">
        <div class="brand">
          <span class="brand-mark">LayoutLab</span>
          <span class="brand-sub">Viewer · Phase A</span>
        </div>
        <div class="toolbar">
          <button type="button" id="btn-paste" class="ghost">Paste export</button>
          <label class="file-btn">
            Open file…
            <input id="file-input" type="file" accept="application/json,.json" hidden />
          </label>
          <button type="button" id="btn-fixture" class="ghost">Kids room (clean)</button>
          <button type="button" id="btn-findings" class="ghost">Kids room (findings)</button>
        </div>
      </header>

      <dialog id="paste-dialog" class="paste-dialog">
        <form method="dialog" id="paste-form">
          <h2>Paste LayoutLab export</h2>
          <p class="muted">
            In Blender: LayoutLab → <strong>Copy Scene Layout</strong>, then paste here
            (<kbd>⌘V</kbd> / <kbd>Ctrl+V</kbd>).
          </p>
          <textarea
            id="paste-text"
            rows="12"
            spellcheck="false"
            placeholder='{ "layoutlab_version": "…", "objects": [ … ] }'
          ></textarea>
          <div class="paste-actions">
            <button type="submit" value="cancel" class="ghost">Cancel</button>
            <button type="submit" value="load" id="btn-paste-load">Load</button>
          </div>
        </form>
      </dialog>

      <aside id="sidebar" class="sidebar">
        <section>
          <h2>Scene</h2>
          <dl id="meta" class="meta"></dl>
        </section>
        <section>
          <h2>Analysis</h2>
          <div id="summary" class="summary"></div>
          <ul id="findings" class="findings"></ul>
        </section>
        <section>
          <h2>Objects</h2>
          <p id="object-count" class="muted"></p>
          <label class="toggle">
            <input id="toggle-clearances" type="checkbox" checked />
            Show clearances
          </label>
          <label class="toggle">
            <input id="toggle-openings" type="checkbox" checked />
            Show openings
          </label>
        </section>
      </aside>

      <main id="viewport" class="viewport" aria-label="3D viewport"></main>
      <p id="status" class="status" role="status"></p>
    </div>
    <script type="module" src="/src/main.js"></script>
  </body>
</html>
